<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Premium do CFC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  background:radial-gradient(circle at top,#5aa0ff,#2f67c8 42%,#173d82 76%,#0d2248);
  color:#fff;font-family:Arial,Helvetica,sans-serif;overflow:hidden;
}
.tela{display:none;min-height:100vh;padding:16px;text-align:center}
.ativa{display:block}
h1{color:#ffd400;font-size:30px;margin:10px 0;text-shadow:2px 2px 4px #000}
p{font-size:18px;line-height:1.35}
button{background:#ffd400;color:#111;border:none;padding:15px 28px;border-radius:35px;font-size:20px;font-weight:bold;margin:10px;cursor:pointer;box-shadow:0 6px 0 #a98700}
button:active{transform:translateY(4px);box-shadow:0 2px 0 #a98700}
.seta{font-size:54px;color:#ffd400;margin-bottom:-22px;position:relative;z-index:20;filter:drop-shadow(0 0 7px #000)}
.area-roleta{position:relative;width:330px;height:330px;margin:18px auto}
.roleta{
 width:330px;height:330px;border-radius:50%;border:8px solid #fff;position:relative;overflow:hidden;
 background:conic-gradient(#e53935 0deg 60deg,#1e88e5 60deg 120deg,#43a047 120deg 180deg,#fdd835 180deg 240deg,#8e24aa 240deg 300deg,#fb8c00 300deg 360deg);
 box-shadow:0 0 35px rgba(255,255,255,.45);transform:rotate(0deg);
}
.roleta::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,transparent 44%,rgba(255,255,255,.28) 45%,transparent 48%),linear-gradient(120deg,transparent 35%,rgba(255,255,255,.18),transparent 65%);pointer-events:none}
.nome-setor{position:absolute;width:124px;height:34px;left:95px;top:144px;transform-origin:70px 20px;font-size:13px;font-weight:900;color:#fff;text-shadow:2px 2px 3px #000;text-align:center;line-height:1.05}
.s1{transform:rotate(30deg) translateY(-119px)}.s2{transform:rotate(90deg) translateY(-119px)}.s3{transform:rotate(150deg) translateY(-119px)}.s4{transform:rotate(210deg) translateY(-119px)}.s5{transform:rotate(270deg) translateY(-119px)}.s6{transform:rotate(330deg) translateY(-119px)}
.centro{position:absolute;width:92px;height:92px;background:#111;border:5px solid #fff;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;justify-content:center;align-items:center;font-size:42px;z-index:5;box-shadow:0 0 15px #000}
.resultado{font-size:23px;color:#ffd400;font-weight:bold;margin-top:12px;min-height:40px}
.card{background:#fff;color:#111;border-radius:24px;padding:18px;margin:15px auto 50px;font-size:20px;line-height:1.35;text-align:left;max-width:680px;max-height:72vh;overflow:auto}
.card strong{color:#092b62}
.opcao{width:100%;display:block;background:#f0f0f0;color:#111;box-shadow:none;border-radius:16px;padding:14px;margin:10px 0;font-size:18px;text-align:left}
.opcao:disabled{opacity:1}
.correta{background:#17a64a!important;color:#fff!important}
.errada{background:#d62828!important;color:#fff!important}
.comentario{margin-top:14px;background:#fff3bf;color:#111;padding:13px;border-radius:15px;font-size:17px}
.painel{background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.30);border-radius:24px;padding:22px;margin:18px auto;max-width:520px}
.placar{font-size:32px;color:#ffd400;margin:22px 0;font-weight:bold}
.confete{font-size:38px;animation:pular .7s infinite alternate}
@keyframes pular{from{transform:translateY(0)}to{transform:translateY(-12px)}}
footer{position:fixed;bottom:7px;left:0;width:100%;text-align:center;font-size:13px;color:#fff}
@media(max-width:390px){
 h1{font-size:27px}.area-roleta{width:300px;height:300px}.roleta{width:300px;height:300px}

 .s1{transform:rotate(30deg) translateY(-106px)}.s2{transform:rotate(90deg) translateY(-106px)}.s3{transform:rotate(150deg) translateY(-106px)}.s4{transform:rotate(210deg) translateY(-106px)}.s5{transform:rotate(270deg) translateY(-106px)}.s6{transform:rotate(330deg) translateY(-106px)}
}
</style>
</head>
<body>

<audio id="musicaRoleta" src="musica.mp3" loop preload="auto"></audio>

<div class="tela ativa" id="roletaTela">
 <h1>🎡 ROLETA DO CFC</h1>
 <p>Responda ao quiz sorteado.</p>

  </div>

  <div id="alternativas"></div>
  <div id="comentario"></div>
 </div>
</div>

<div class="tela" id="fimTela">
 <h1>🏆 RESULTADO FINAL</h1>
 <div class="painel">
  <div class="confete">🎊 🎉 🎊</div>
  <div class="placar" id="placarFinal"></div>
  <button onclick="reiniciar()">GIRAR NOVAMENTE</button>
 </div>
</div>

<footer>Curso de Contabilidade Professor Moreira</footer>

al sempre"], "correta": 0, "comentario": "Despesas reduzem o resultado e diminuem o Patrimônio Líquido."}, {"pergunta": "Compra de mercadoria a prazo gera:", "opcoes": ["Aumento do Ativo e do Passivo", "Redução do Ativo e PL", "Apenas despesa", "Apenas receita"], "correta": 0, "comentario": "Aumenta estoque no Ativo e fornecedores no Passivo."}, {"pergunta": "Pagamento de dívida em dinheiro gera:", "opcoes": ["Diminuição do Ativo e do Passivo", "Aumento do Ativo e PL", "Aumento de Receita", "Aumento de Despesa"], "correta": 0, "comentario": "Sai dinheiro do Ativo e baixa obrigação no Passivo."}, {"pergunta": "Conta de natureza devedora é:", "opcoes": ["Estoques", "Fornecedores", "Capital Social", "Receita"], "correta": 0, "comentario": "Estoques é conta do Ativo, normalmente de natureza devedora."}, {"pergunta": "Conta de natureza credora é:", "opcoes": ["Caixa", "Clientes", "Fornecedores", "Estoques"], "correta": 2, "comentario": "Fornecedores é obrigação, logo tem natureza credora."}, {"pergunta": "O Balanço Patrimonial evidencia:", "opcoes": ["Posição patrimonial e financeira", "Somente receitas", "Somente despesas", "Fluxo de produção"], "correta": 0, "comentario": "O Balanço apresenta ativos, passivos e patrimônio líquido."}], "Custos": [{"pergunta": "No custeio por absorção entram:", "opcoes": ["Custos fixos e variáveis de produção", "Só custos variáveis", "Só despesas", "Só custos diretos"], "correta": 0, "comentario": "O custeio por absorção apropria todos os custos de produção."}, {"pergunta": "Matéria-prima consumida é:", "opcoes": ["Custo direto", "Despesa comercial", "Receita", "Passivo"], "correta": 0, "comentario": "Matéria-prima aplicada ao produto é custo direto."}, {"pergunta": "Comissão de vendedores é:", "opcoes": ["Despesa comercial", "Custo direto", "CIF", "Estoque"], "correta": 0, "comentario": "Comissão de vendas é despesa comercial."}, {"pergunta": "Aluguel da fábrica é:", "opcoes": ["CIF", "Despesa financeira", "Receita", "Despesa comercial"], "correta": 0, "comentario": "É custo indireto de fabricação, pois está ligado à produção."}, {"pergunta": "Mão de obra direta é:", "opcoes": ["Custo direto", "Despesa administrativa", "Receita", "Passivo"], "correta": 0, "comentario": "Pode ser identificada diretamente com o produto."}, {"pergunta": "Depreciação da máquina fabril é:", "opcoes": ["Custo de produção", "Despesa comercial", "Receita", "Dedução da venda"], "correta": 0, "comentario": "Máquina usada na produção gera custo de produção."}, {"pergunta": "Propaganda é:", "opcoes": ["Despesa comercial", "Custo direto", "CIF", "Estoque"], "correta": 0, "comentario": "Propaganda está ligada à venda, não à fabricação."}, {"pergunta": "Custo de transformação é:", "opcoes": ["MOD + CIF", "MP + despesas", "Receita - despesa", "Ativo + passivo"], "correta": 0, "comentario": "Custo de transformação reúne mão de obra direta e custos indiretos de fabricação."}, {"pergunta": "Frete para entregar ao cliente é:", "opcoes": ["Despesa de venda", "Custo do produto", "Matéria-prima", "CIF"], "correta": 0, "comentario": "Frete de entrega ao cliente ocorre após a produção."}, {"pergunta": "Material indireto é:", "opcoes": ["CIF", "Despesa financeira", "Receita", "PL"], "correta": 0, "comentario": "Material indireto é custo indireto de fabricação."}, {"pergunta": "Custo variável muda conforme:", "opcoes": ["Volume produzido", "Capital social", "Lucro acumulado", "Auditoria"], "correta": 0, "comentario": "Custos variáveis acompanham o volume de produção."}, {"pergunta": "Custo fixo, no total, tende a:", "opcoes": ["Permanecer constante dentro da faixa relevante", "Zerar sempre", "Virar receita", "Ser sempre direto"], "correta": 0, "comentario": "Dentro de determinada faixa, o custo fixo total permanece estável."}, {"pergunta": "Salário do gerente da fábrica é:", "opcoes": ["CIF", "Despesa comercial", "Receita", "Despesa financeira"], "correta": 0, "comentario": "Como está ligado à fábrica e não a um produto específico, é CIF."}, {"pergunta": "Embalagem do produto vendido pode ser:", "opcoes": ["Custo direto", "Receita", "Passivo", "Despesa financeira"], "correta": 0, "comentario": "Quando integra o produto, a embalagem pode ser custo direto."}, {"pergunta": "Gasto administrativo é:", "opcoes": ["Despesa", "Custo de produção", "Estoque", "CIF sempre"], "correta": 0, "comentario": "Gastos administrativos são despesas, não custos de fabricação."}], "Contabilidade Pública": [{"pergunta": "Empenho cria:", "opcoes": ["Obrigação de pagamento", "Receita tributária", "Balanço patrimonial", "Dívida ativa"], "correta": 0, "comentario": "O empenho cria para o Estado obrigação de pagamento."}, {"pergunta": "Liquidação verifica:", "opcoes": ["Direito do credor", "Previsão da receita", "Capital social", "Lucro líquido"], "correta": 0, "comentario": "Na liquidação, verifica-se se o credor cumpriu sua parte."}, {"pergunta": "Pagamento é:", "opcoes": ["Entrega do numerário ao credor", "Primeiro estágio", "Previsão da receita", "Fixação da despesa"], "correta": 0, "comentario": "Pagamento é o último estágio clássico da despesa."}, {"pergunta": "Restos a pagar são despesas:", "opcoes": ["Empenhadas e não pagas até 31/12", "Sem empenho", "Sempre canceladas", "Pagas antecipadamente"], "correta": 0, "comentario": "Restos a pagar decorrem de despesas empenhadas e não pagas no exercício."}, {"pergunta": "Receita corrente financia:", "opcoes": ["Manutenção das atividades", "Somente obras", "Somente empréstimos", "Alienação de bens"], "correta": 0, "comentario": "Receitas correntes financiam despesas correntes."}, {"pergunta": "Despesa de capital inclui:", "opcoes": ["Investimentos", "Material de consumo", "Pessoal", "Juros"], "correta": 0, "comentario": "Investimentos são despesas de capital."}, {"pergunta": "Despesa corrente inclui:", "opcoes": ["Pessoal e encargos", "Obras", "Inversões financeiras", "Amortização da dívida"], "correta": 0, "comentario": "Pessoal e encargos sociais são despesas correntes."}, {"pergunta": "Crédito suplementar serve para:", "opcoes": ["Reforçar dotação existente", "Criar imposto", "Arrecadar receita", "Liquidar despesa"], "correta": 0, "comentario": "O crédito suplementar reforça dotação orçamentária já existente."}, {"pergunta": "Receita orçamentária é reconhecida pela:", "opcoes": ["Arrecadação", "Liquidação", "Empenho", "Pagamento"], "correta": 0, "comentario": "Na ótica orçamentária, a receita é reconhecida pela arrecadação."}, {"pergunta": "Despesa orçamentária é reconhecida pelo:", "opcoes": ["Empenho", "Recebimento", "Lançamento tributário", "Recolhimento"], "correta": 0, "comentario": "Na ótica orçamentária, a despesa é reconhecida pelo empenho."}, {"pergunta": "Lei Orçamentária Anual é:", "opcoes": ["LOA", "LDO", "PPA", "LRF"], "correta": 0, "comentario": "LOA é a Lei Orçamentária Anual."}, {"pergunta": "PPA trata de:", "opcoes": ["Planejamento de médio prazo", "Pagamento imediato", "Folha mensal", "Nota fiscal"], "correta": 0, "comentario": "O PPA estabelece planejamento de médio prazo."}, {"pergunta": "LDO orienta:", "opcoes": ["Elaboração da LOA", "Auditoria privada", "Capital social", "Demonstração do resultado"], "correta": 0, "comentario": "A LDO orienta a elaboração da Lei Orçamentária Anual."}, {"pergunta": "Receita de impostos é:", "opcoes": ["Receita corrente", "Receita de capital", "Despesa corrente", "Despesa de capital"], "correta": 0, "comentario": "Impostos são receitas correntes tributárias."}, {"pergunta": "Alienação de bens gera:", "opcoes": ["Receita de capital", "Receita corrente", "Despesa corrente", "Restos a pagar"], "correta": 0, "comentario": "Alienação de bens é receita de capital."}], "Auditoria": [{"pergunta": "Objetivo da auditoria independente é:", "opcoes": ["Emitir opinião", "Garantir lucro", "Fazer contabilidade", "Substituir gestores"], "correta": 0, "comentario": "O auditor emite opinião sobre as demonstrações contábeis."}, {"pergunta": "Evidência deve ser:", "opcoes": ["Apropriada e suficiente", "Ap let quizAtual=[];
let materiaSorteada="",indiceSorteado=0,questaoAtual=0,acertos=0,girando=false,parando=false,angulo=0,velocidade=0,animacao=null;

function abrirTela(id){document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));document.getElementById(id).classList.add("ativa");}

function tocarMusica(){
 const audio=document.getElementById("musicaRoleta");
 audio.volume=1;
 audio.currentTime=0;
 audio.play().catch(()=>{});
}

function pararMusicaSuave(){
 const audio=document.getElementById("musicaRoleta");
 let fade=setInterval(()=>{
   if(audio.volume>0.06){audio.volume=Math.max(0,audio.volume-0.06);}
   else{clearInterval(fade);audio.pause();audio.currentTime=0;audio.volume=1;}
 },120);
}

function controlarRoleta(){if(!girando){iniciarGiroLivre();}else if(girando&&!parando){pararRoleta();}}

function iniciarGiroLivre(){
 girando=true;parando=false;velocidade=85;
 document.getElementById("resultadoRoleta").innerHTML="Girando rápido...";
 document.getElementById("botaoRoleta").innerHTML="🛑 PARAR";
 document.getElementById("botaoRoleta").disabled=false;
 const r=document.getElementById("roleta");
 r.style.transition="none";
 tocarMusica();
 animarGiro();
}

function animarGiro(){
 angulo+=velocidade;
 document.getElementById("roleta").style.transform=`rotate(${angulo}deg)`;
 animacao=requestAnimationFrame(animarGiro);
}

function pararRoleta(){
 if(parando)return;parando=true;
 document.getElementById("resultadoRoleta").innerHTML="Desacelerando...";
 document.getElementById("botaoRoleta").innerHTML="AGUARDE...";
 document.getElementById("botaoRoleta").disabled=true;
 indiceSorteado=Math.floor(Math.random()*materias.length);
 materiaSorteada=materias[indiceSorteado];
 cancelAnimationFrame(animacao);
 const setor=360/materias.length;
 const centroDoSetor=indiceSorteado*setor+setor/2;
 const atual=((angulo%360)+360)%360;
 let alvo=(360-centroDoSetor);
 alvo=((alvo%360)+360)%360;
 let diferenca=alvo-atual;
 if(diferenca<0)diferenca+=360;
 const anguloFinal=angulo+diferenca+(8*360);
 const roleta=document.getElementById("roleta");
 roleta.style.transition="transform 3.8s cubic-bezier(.06,.86,.16,1)";
 roleta.style.transform=`rotate(${anguloFinal}deg)`;
 angulo=anguloFinal;
 setTimeout(()=>{
  pararMusicaSuave();
  document.getElementById("resultadoRoleta").innerHTML="🎯 Sorteado: "+materiaSorteada;
  girando=false;parando=false;
  document.getElementById("botaoRoleta").disabled=false;
  document.getElementById("botaoRoleta").innerHTML="GIRAR ROLETA";
  setTimeout(()=>iniciarQuiz(),1300);
 },3900);
}

function embaralhar(lista){
 for(let i=lista.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [lista[i],lista[j]]=[lista[j],lista[i]];
 }
 return lista;
}

function iniciarQuiz(){
 questaoAtual=0;acertos=0;
 quizAtual=embaralhar([...quizzes[materiaSorteada]]).slice(0,5);
 document.getElementById("tituloQuiz").innerHTML=materiaSorteada;
 abrirTela("quizTela");
 mostrarQuestao();
}

function mostrarQuestao(){
 const quiz=quizAtual,q=quiz[questaoAtual];
 document.getElementById("comentario").innerHTML="";
 document.getElementById("pergunta").innerHTML=`<strong>Questão ${questaoAtual+1} de ${quiz.length}</strong><br><br>${q.pergunta}`;
 let h="";
 q.opcoes.forEach((opcao,i)=>{h+=`<button class="opcao" onclick="responder(${i})">${String.fromCharCode(65+i)}) ${opcao}</button>`;});
 document.getElementById("alternativas").innerHTML=h;
}

function responder(indice){
 const quiz=quizAtual,q=quiz[questaoAtual],botoes=document.querySelectorAll(".opcao");
 botoes.forEach(b=>b.disabled=true);
 if(indice===q.correta){botoes[indice].classList.add("correta");acertos++;}
 else{botoes[indice].classList.add("errada");botoes[q.correta].classList.add("correta");}
 document.getElementById("comentario").innerHTML=`<div class="comentario"><strong>Comentário:</strong><br>${q.comentario}</div>`;
 setTimeout(()=>{questaoAtual++; if(questaoAtual<quiz.length)mostrarQuestao(); else finalizarQuiz();},3200);
}

function finalizarQuiz(){
 abrirTela("fimTela");
 const total=quizAtual.length;
 document.getElementById("placarFinal").innerHTML=`${materiaSorteada}<br><br>Você acertou ${acertos} de ${total}<br><br>${estrelas(acertos,total)}`;
}

function estrelas(acertos,total){
 const p=acertos/total;
 if(p===1)return "⭐⭐⭐⭐⭐";
 if(p>=.7)return "⭐⭐⭐⭐";
 if(p>=.5)return "⭐⭐⭐";
 if(p>=.3)return "⭐⭐";
 return "⭐";
}

function reiniciar(){
 document.getElementById("resultadoRoleta").innerHTML="";
 document.getElementById("botaoRoleta").innerHTML="GIRAR ROLETA";
 document.getElementById("botaoRoleta").disabled=false;
 abrirTela("roletaTela");
}
